version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: salesdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: changeme
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build: .
    depends_on:
      - mysql
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8000:80"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80"]

volumes:
  db_data:
